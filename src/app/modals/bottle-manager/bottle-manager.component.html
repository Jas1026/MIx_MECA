<ion-header class="ion-no-border">
  <ion-toolbar color="white" class="custom-toolbar">
    <ion-title>Control de Insumo: <span>{{ ingredient?.nombre }}</span></ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrar()" class="close-btn">
        <ion-icon name="close-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding main-bg">

  <div class="registration-panel ion-margin-bottom">
    <div class="panel-header">
      <ion-icon name="layers" color="primary"></ion-icon>
      <ion-label>Registro de Envases</ion-label>
    </div>
    
    <ion-grid>
      <ion-row>
        <ion-col size="12" size-sm="6" size-md="3">
          <div class="modern-input">
            <span>Peso (g) actual</span>
            <ion-input type="number" [(ngModel)]="nuevaBotella.peso_envase" placeholder="0"></ion-input>
          </div>
        </ion-col>
        <ion-col size="12" size-sm="6" size-md="3">
          <div class="modern-input">
            <span>Capacidad (ml)</span>
            <ion-input type="number" [(ngModel)]="nuevaBotella.capacidad_total" placeholder="0"></ion-input>
          </div>
        </ion-col>
        <ion-col size="12" size-sm="6" size-md="3">
          <div class="modern-input">
            <span>Peso Lleno (g)</span>
            <ion-input type="number" [(ngModel)]="nuevaBotella.peso_actual" placeholder="0"></ion-input>
          </div>
        </ion-col>
        <ion-col size="12" size-sm="6" size-md="3">
          <div class="modern-input highlight-input">
            <span>Cantidad</span>
            <ion-input type="number" [(ngModel)]="nuevaBotella.cantidad"></ion-input>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
    
    <div class="ion-padding">
      <ion-button expand="block" (click)="registrarBotella()" mode="ios" class="btn-gradient" [disabled]="isSaving">
        <ion-spinner name="crescent" *ngIf="isSaving"></ion-spinner>
        <ion-icon name="add-circle" slot="start" *ngIf="!isSaving"></ion-icon>
        {{ isSaving ? 'REGISTRANDO...' : 'AÑADIR AL INVENTARIO' }}
      </ion-button>
    </div>
  </div>

  <h3 class="modern-title">Envases en Uso</h3>

  <div *ngFor="let b of bottles" class="modern-bottle-card">
    <ion-grid fixed class="ion-no-padding">
      <ion-row class="ion-align-items-center">
        <ion-col size="3" size-sm="2" class="visual-col">
          <div class="bottle-wrapper">
            <div class="bottle-body">
              <div class="liquid" 
                   [style.height]="(getPorcentaje(b) > 100 ? 100 : getPorcentaje(b)) + '%'" 
                   [class.overloaded]="getPorcentaje(b) > 100"
                   [class.low]="getPorcentaje(b) < 20">
              </div>
              <span class="value">{{ getPorcentaje(b) }}%</span>
            </div>
          </div>
        </ion-col>

        <ion-col size="5" size-sm="6" class="info-col ion-padding-start">
          <div class="id-tag">ID: #{{ b.id_bottle }}</div>
          <h2 class="bottle-title">Envase Activo</h2>
          <div class="neto-display">
            <span>Contenido Neto</span>
            <strong>{{ getNeto(b) }} <i>g</i></strong>
          </div>
        </ion-col>

        <ion-col size="4" class="control-col">
          <div class="weight-card">
            <ion-label>PESAJE</ion-label>
            <ion-input type="number" [(ngModel)]="b.peso_actual" class="modern-weight-input"></ion-input>
            <ion-button (click)="actualizarPeso(b)" mode="ios" fill="solid" color="success" class="save-btn">
              <ion-icon name="save" slot="icon-only"></ion-icon>
            </ion-button>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
