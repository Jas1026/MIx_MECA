<ion-header>
  <ion-toolbar color="primary">
    <ion-title>{{ product ? 'Editar' : 'Nuevo' }} Producto</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card class="ion-no-margin">
    <ion-list lines="full">
      <ion-item>
        <ion-label position="stacked">Nombre del Producto</ion-label>
        <ion-input [(ngModel)]="newProduct.nombre_producto" type="text" placeholder="Ej: Pizza Familiar"></ion-input>
      </ion-item>

      <ion-row>
        <ion-col size="6">
          <ion-item>
            <ion-label position="stacked">Precio (Bs)</ion-label>
            <ion-input [(ngModel)]="newProduct.price" type="number" placeholder="0.00"></ion-input>
          </ion-item>
        </ion-col>
        <ion-col size="6">
          <ion-item>
            <ion-label position="stacked">Categoría</ion-label>
            <ion-select [(ngModel)]="newProduct.id_category" placeholder="Elegir">
              <ion-select-option *ngFor="let cat of categories" [value]="cat.id">{{cat.name}}</ion-select-option>
            </ion-select>
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-item>
        <ion-label position="stacked">Cocina(s) Destino</ion-label>
        <ion-select [(ngModel)]="cocinasSeleccionadas" multiple="true" okText="Asignar" cancelText="Cancelar">
          <ion-select-option *ngFor="let k of allKitchens" [value]="k.id">{{k.nombre || k.name}}</ion-select-option>
        </ion-select>
      </ion-item>
    </ion-list>
  </ion-card>

  <div class="ion-margin-top">
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 0 10px;">
      <h3 style="font-size: 1.1em; font-weight: bold;">Receta e Insumos</h3>
      <ion-button (click)="addIngredientRow()" size="small" fill="outline">
        <ion-icon name="add" slot="start"></ion-icon> Añadir Insumo
      </ion-button>
    </div>

    <div *ngIf="receta.length === 0" class="ion-text-center ion-padding">
      <small>No hay insumos agregados.</small>
    </div>

    <div *ngFor="let item of receta; let i = index" class="recipe-row">
      <ion-grid class="ion-no-padding">
        <ion-row class="ion-align-items-center">
          <ion-col size="7">
            <ion-item lines="none" class="inner-item">
              <ion-select [(ngModel)]="item.id_ingredient" placeholder="Insumo" interface="popover">
                <ion-select-option *ngFor="let ing of allIngredients" [value]="ing.id_ingredients">
                  {{ing.nombre}} ({{ing.unidad_med}})
                </ion-select-option>
              </ion-select>
            </ion-item>
          </ion-col>
          <ion-col size="3">
            <ion-item lines="none" class="inner-item">
              <ion-input [(ngModel)]="item.cant_us" type="number" placeholder="Cant."></ion-input>
            </ion-item>
          </ion-col>
          <ion-col size="2" class="ion-text-right">
            <ion-button (click)="removeIngredient(i)" fill="clear" color="danger">
              <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
            </ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
    </div>
  </div>

  <ion-button (click)="saveProduct()" expand="block" color="dark" class="ion-margin-top save-button">
    <ion-icon name="save" slot="start"></ion-icon>
    Guardar Producto y Receta
  </ion-button>
</ion-content>
