<ion-header class="ion-no-border">
  <ion-toolbar color="dark">
    <ion-title>{{ table ? 'Editar' : 'Nueva' }} Mesa</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card class="ion-no-margin" style="box-shadow: none; border: 1px solid #e8e1d9;">
    <ion-list lines="full">
      
      <ion-item>
        <ion-label position="stacked" style="color: #4a3f35; font-weight: bold;">Nombre de la Mesa</ion-label>
        <ion-input [(ngModel)]="newTable.nombre" type="text" placeholder="Ej: Mesa 1, VIP 1..."></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked" style="color: #4a3f35; font-weight: bold;">Asignar a Piso / Área</ion-label>
        <ion-select [(ngModel)]="newTable.id_flats" placeholder="Seleccione un área" interface="popover">
          <ion-select-option *ngFor="let flat of flats" [value]="flat.Id_flats">
            {{ flat.Name }}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <ion-label position="stacked" style="color: #4a3f35; font-weight: bold;">Capacidad (Personas)</ion-label>
        <ion-input [(ngModel)]="newTable.capacidad" type="number" placeholder="4"></ion-input>
      </ion-item>

    </ion-list>
  </ion-card>

  <ion-button (click)="saveTable()" expand="block" color="dark" class="ion-margin-top" 
              style="--border-radius: 12px; height: 48px; font-weight: bold;">
    <ion-icon name="save-outline" slot="start"></ion-icon>
    Guardar Configuración
  </ion-button>
</ion-content>
