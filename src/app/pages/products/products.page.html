<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button icon="caret-back"></ion-back-button>
    </ion-buttons>
    <ion-title>{{catName}}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="products">
    <ion-button *ngFor="let product of products" class="clear-yellow" (click)="AddProduct($event, product)" expand="block" fill="clear">
      <ion-icon slot="start" name="add-circle-outline"></ion-icon><span>{{product.name}}</span>
    </ion-button>
  </div>
</ion-content>
