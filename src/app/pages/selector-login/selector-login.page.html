<ion-content class="login-bg">

  <div class="overlay">

    <div class="login-layout">

      <!-- Panel izquierdo (solo web) -->
      <div class="side-panel left-panel">
        <div class="brand-info">
          <h2>Mixtura Café</h2>
          <p>Experiencia artesanal en cada taza</p>
        </div>
      </div>

      <!-- Centro -->
      <div class="center-panel">

        <div class="login-card" [ngClass]="{ 'meca-theme': isMeca }">

          <!-- Logo central -->
          <div class="logo-area">
            <img src="/assets/images/logo.png" alt="logo">
          </div>

          <!-- Título dinámico -->
          <h1 class="system-title">
            {{ isMeca ? 'Meca System' : 'Mixtura Café' }}
          </h1>

          <!-- Interruptor tipo grano -->
          <div class="switch-wrapper">

            <span [class.active]="!isMeca">Mixtura</span>

            <div class="coffee-switch" (click)="isMeca = !isMeca">
              <div class="bean" [class.active]="isMeca"></div>
            </div>

            <span [class.active]="isMeca">Meca</span>

          </div>

          <!-- Formulario -->
          <div class="form-area">

            <ion-item lines="none">
              <ion-input
                placeholder="Nombre de usuario"
                type="text"
                [(ngModel)]="email">
              </ion-input>
            </ion-item>

            <ion-item lines="none">
              <ion-input
                placeholder="Contraseña"
                type="password"
                [(ngModel)]="password">
              </ion-input>
            </ion-item>

            <ion-button expand="block" shape="round" (click)="login()">
              Ingresar
            </ion-button>

          </div>

        </div>
      </div>

      <!-- Panel derecho (solo web) -->
      <div class="side-panel right-panel">
        <div class="brand-info">
          <h2>Meca</h2>
          <p>Gestión inteligente y moderna</p>
        </div>
      </div>

    </div>

  </div>

</ion-content>
