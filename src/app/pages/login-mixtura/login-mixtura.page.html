<ion-header>
  <ion-toolbar>
    <ion-title>Usuarios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list *ngIf="users.length > 0">
    <ion-item *ngFor="let user of users">
      <ion-label>
        <h2>{{ user.name }}</h2>
        <p>Code: {{ user.code }}</p>
        <p>Rol: {{ user.role }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <div *ngIf="users.length === 0" style="text-align:center;margin-top:30px;">
    No hay usuarios
  </div>

</ion-content>
