
<ion-menu
  contentId="main-content"
  side="start"
  menuId="flatsMenu"
  type="overlay"
  [swipeGesture]="false"
  (ionDidOpen)="onMenuOpen()"
  (ionDidClose)="onMenuClose()">
    <ion-header class="ion-no-border">
      <ion-toolbar color="primary">
        <ion-title>Menú Principal</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content class="menu-content">
      <ion-list>
        
        <!-- SECCIÓN DE PISOS -->
        <ng-container *ngIf="hasRole('admin') || hasRole('jefe_mesero') || hasRole('mesero')">
          <ion-item-divider mode="ios">
            <ion-label>PISOS / ÁREAS</ion-label>
          </ion-item-divider>
          <ion-item button *ngFor="let flat of flats" (click)="goToFlat(flat.id_flat || flat.Id_flats || flat.id)">
            <ion-icon name="layers-outline" slot="start" color="secondary"></ion-icon>
            <ion-label>{{ flat.name }}</ion-label>
          </ion-item>
        </ng-container>

        <!-- SECCIÓN DE COCINAS -->
        <ng-container *ngIf="hasRole('admin') || hasRole('cocina')">
          <ion-item-divider mode="ios">
            <ion-label>COCINAS Y PREPARACIÓN</ion-label>
          </ion-item-divider>
          <ion-item button *ngFor="let kitchen of kitchens" (click)="goToKitchen(kitchen.id)">
            <ion-icon name="restaurant-outline" slot="start" color="warning"></ion-icon>
            <ion-label>{{ kitchen.name }}</ion-label>
          </ion-item>
        </ng-container>

        <!-- SECCIÓN DE OPERACIONES -->
        <ion-item-divider mode="ios">
          <ion-label>OPERACIONES</ion-label>
        </ion-item-divider>

        <ion-item button *ngIf="hasRole('admin') || hasRole('jefe_mesero')" routerLink="/panel/pedidos">
          <ion-icon name="receipt-outline" slot="start"></ion-icon>
          <ion-label>Gestión de pedidos</ion-label>
        </ion-item>

        <ion-item button *ngIf="hasRole('admin') || hasRole('jefe_mesero') || hasRole('mesero')" routerLink="/panel/pedidos_unit">
          <ion-icon name="clipboard-outline" slot="start"></ion-icon>
          <ion-label>Mis pedidos</ion-label>
        </ion-item>

        <ion-item button *ngIf="hasRole('admin') || hasRole('jefe_mesero') || hasRole('cocina')" routerLink="/panel/inventario">
          <ion-icon name="cube-outline" slot="start"></ion-icon>
          <ion-label>Inventario</ion-label>
        </ion-item>

        <!-- SECCIÓN DE ADMINISTRACIÓN -->
        <ng-container *ngIf="hasRole('admin')">
          <ion-item-divider mode="ios">
            <ion-label>CONFIGURACIÓN</ion-label>
          </ion-item-divider>

          <ion-item button routerLink="/panel/user">
            <ion-icon name="person-circle-outline" slot="start"></ion-icon>
            <ion-label>Gestión de usuarios</ion-label>
          </ion-item>

          <ion-item button routerLink="/panel/flats">
            <ion-icon name="map-outline" slot="start"></ion-icon>
            <ion-label>Gestión de pisos</ion-label>
          </ion-item>

          <ion-item button routerLink="/panel/kitchens">
            <ion-icon name="flame-outline" slot="start"></ion-icon>
            <ion-label>Gestión de cocinas</ion-label>
          </ion-item>

          <ion-item button routerLink="/panel/tables">
            <ion-icon name="grid-outline" slot="start"></ion-icon>
            <ion-label>Gestión de mesas</ion-label>
          </ion-item>

          <ion-item button routerLink="/panel/informes">
            <ion-icon name="analytics-outline" slot="start"></ion-icon>
            <ion-label>Informes y reportes</ion-label>
          </ion-item>
        </ng-container>

        <!-- UBICACIONES -->
        <ion-item button *ngIf="hasRole('admin') || hasRole('jefe_mesero')" routerLink="/panel/locations">
          <ion-icon name="location-outline" slot="start"></ion-icon>
          <ion-label>Ubicaciones</ion-label>
        </ion-item>

      </ion-list>
    </ion-content>
  </ion-menu>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="ion-page" id="main-content">
    <ion-header class="ion-no-border">
      <ion-toolbar class="toolbar-cafe">
<ion-buttons slot="start">

  <ion-menu-button
    autoHide="false"
    (click)="removeFocus($event)">
  </ion-menu-button>

</ion-buttons>
        <ion-title>{{ systemName }}</ion-title>
        <ion-buttons slot="end">
          <ion-button fill="clear" (click)="logout()">
            <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>

      <ion-toolbar class="sub-toolbar">
        <div class="welcome-box">
          <ion-text>☕ Bienvenido al sistema</ion-text>
        </div>
      </ion-toolbar>
    </ion-header>

<ion-router-outlet id="main-router"></ion-router-outlet>
  </div>
