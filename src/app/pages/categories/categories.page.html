<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button icon="caret-back"></ion-back-button>
    </ion-buttons>
    <ion-input [(ngModel)]="search" (ionInput)="Search($event)" placeholder="Buscar producto"></ion-input>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div *ngIf="showCategories" class="categories">
    <div (click)="SeeProducts(category.id, category.name)" *ngFor="let category of categories" class="category">
      {{category.name}}
    </div>    
  </div>
  <div *ngIf="!showCategories" class="products">
    <div *ngFor="let product of products">
      <ion-button  *ngIf="product.state=='si'" class="clear-yellow" (click)="AddProduct($event, product)" expand="block" fill="clear">
        <ion-icon slot="start" name="add-circle-outline"></ion-icon><span>{{product.name}}</span>
      </ion-button>
    </div>
  </div>
</ion-content>
