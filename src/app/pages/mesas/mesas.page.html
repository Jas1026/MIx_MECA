<div class="tables-container">
  <div class="table-card" *ngFor="let mesa of tables" 
       [ngClass]="{
         'status-libre': mesa.estado === 'Libre',
         'status-ready': mesa.estado === 'Ready',
         'status-ocupada': mesa.estado !== 'Libre' && mesa.estado !== 'Ready'
       }">

    <div class="status-badge">{{ mesa.estado }}</div>

    <div class="table-icon-wrapper">
      <ion-icon name="restaurant-outline" *ngIf="mesa.estado === 'Libre'"></ion-icon>
      <ion-icon name="notifications-outline" class="pulse" *ngIf="mesa.estado === 'Ready'"></ion-icon>
      <ion-icon name="people-outline" *ngIf="mesa.estado !== 'Libre' && mesa.estado !== 'Ready'"></ion-icon>
    </div>

    <div class="table-info">
      <h2>{{ mesa.nombre }}</h2>
      
      <p [class]="getTimerClass(mesa)" *ngIf="mesa.estado !== 'Libre' && mesa.order_date">
        <ion-icon name="time-outline"></ion-icon> 
        <span>{{ mesa.timeDisplay }} / {{ mesa.estimated_time || 0 }} min</span>
      </p>

      <p class="table-subtitle">Capacidad estándar</p>
    </div>

    <div class="table-actions">
      <ion-button *ngIf="mesa.estado === 'Libre'" expand="block" shape="round" class="btn-tomar" (click)="openOrderModal(mesa)">
        <ion-icon name="add-circle-outline" slot="start"></ion-icon> Tomar Pedido
      </ion-button>

      <ion-button *ngIf="mesa.estado === 'Ready'" expand="block" shape="round" color="warning" (click)="abrirResumen(mesa.order_id)">
        <ion-icon name="checkmark-done-circle-outline" slot="start"></ion-icon> ENTREGAR
      </ion-button>

      <p class="msg-ocupada" *ngIf="mesa.estado === 'Pendiente' || (mesa.estado !== 'Libre' && mesa.estado !== 'Ready')">
        En servicio...
      </p>
    </div>
  </div>
</div>
