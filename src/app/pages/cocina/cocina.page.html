<ion-header class="ion-no-border">
  <ion-toolbar class="toolbar-cocina">
    <ion-title>Panel de Cocina - {{ kitchenName }}</ion-title>
    <ion-buttons slot="end">
      <ion-badge color="dark">{{ orders.length }} Pendientes</ion-badge>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="cocina-bg">
  <div class="orders-grid">
    <div class="order-ticket" *ngFor="let item of orders">
      
      <div class="ticket-header">
        <span class="table-number">Mesa {{ item.table_id }}</span>
        <div [class]="getTimerClass(item)">
          <ion-icon name="time-outline"></ion-icon>
          <span>{{ item.timeLeft }}</span>
        </div>
      </div>

      <div class="ticket-body">
        <h2 class="product-name">
          <span class="quantity">{{ item.quantity }}x</span> 
          {{ item.name }}
        </h2>
        <p class="order-note" *ngIf="item.notes">{{ item.notes }}</p>
      </div>

      <div class="ticket-footer">
        <ion-button 
          expand="block" 
          class="btn-ready"
          (click)="markReady(item.detail_id)">
          <ion-icon name="checkmark-circle" slot="start"></ion-icon>
          TERMINADO
        </ion-button>
      </div>

    </div>
  </div>

  <div *ngIf="orders.length === 0" class="empty-kitchen">
    <ion-icon name="restaurant-outline"></ion-icon>
    <p>¡Cocina al día! No hay pedidos pendientes.</p>
  </div>
</ion-content>
